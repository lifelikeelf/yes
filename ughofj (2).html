    body {
        margin: 0;
        background: #000;
        overflow: hidden;
        font-family: "Segoe UI", Arial, sans-serif;
        user-select: none;
    }

    #loadingScreen {
        position: fixed;
        inset: 0;
        background: black;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 32px;
        z-index: 20;
    }

    #startScreen {
        position: fixed;
        inset: 0;
        background: url('title.jpg') center/cover no-repeat;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        z-index: 15;
    }

    #startButton {
        padding: 20px 50px;
        font-size: 30px;
        background: rgba(0,0,0,0.6);
        color: white;
        border: 3px solid white;
        border-radius: 12px;
        cursor: pointer;
        transition: 0.3s;
    }
    #startButton:hover {
        background: rgba(255,255,255,0.2);
    }

    #backgroundImage {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0;
        transition: opacity 1s ease;
        z-index: -1;
    }

    #vignette {
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: radial-gradient(circle, transparent 50%, rgba(0,0,0,0.7));
        z-index: 0;
    }

    #characterLayer {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 1;
    }

    .characterSprite {
        position: absolute;
        bottom: 0;
        opacity: 0;
        transform: translateY(20px);
        transition: opacity 1s ease, transform 1s ease;
    }

    #textbox {
        position: absolute;
        bottom: 0;
        width: 100%;
        background: rgba(0,0,0,0.65);
        color: white;
        padding: 25px;
        font-size: 22px;
        box-sizing: border-box;
        z-index: 3;
        border-top: 2px solid rgba(255,255,255,0.2);
        backdrop-filter: blur(4px);
    }

    #nameBox {
        position: absolute;
        bottom: 180px;
        left: 40px;
        background: rgba(0,0,0,0.75);
        padding: 12px 25px;
        font-size: 24px;
        color: #FFD700;
        border: 2px solid #FFD700;
        border-radius: 10px;
        display: none;
        z-index: 3;
    }

    #choices {
        position: absolute;
        bottom: 220px;
        width: 100%;
        display: none;
        justify-content: center;
        gap: 20px;
        z-index: 4;
    }

    .choiceBtn {
        padding: 15px 30px;
        background: rgba(255,255,255,0.1);
        border: 2px solid white;
        color: black;
        cursor: pointer;
        font-size: 20px;
        border-radius: 10px;
        transition: 0.3s;
        font-weight: 900;
    }
    .choiceBtn:hover {
        background: rgba(255,255,255,0.3);
    }

    #saveLoadButtons {
        position: absolute;
        top: 20px;
        right: 20px;
        display: flex;
        gap: 10px;
        z-index: 5;
    }

    .slBtn {
        padding: 10px 20px;
        background: rgba(0,0,0,0.6);
        border: 2px solid white;
        color: white;
        cursor: pointer;
        border-radius: 8px;
        transition: 0.3s;
    }
    .slBtn:hover {
        background: rgba(255,255,255,0.2);
    }

    .fade-letter {
        opacity: 0;
        display: inline-block;
        animation: fadeIn 0.05s forwards;
    }

    @keyframes fadeIn {
        to { opacity: 1; }
    }
</style>

/* ---------------- GAME STATE ---------------- */

let currentScene = 0;
let textIndex = 0;

window.onload = () => {
    setTimeout(() => {
        document.getElementById("loadingScreen").style.display = "none";
    }, 1200);

    if (localStorage.getItem("vn_save")) {
        document.getElementById("startButton").innerText = "Continue";
    }
};

function startGame() {
    document.getElementById("startScreen").style.display = "none";
    loadGame(true);
    showScene();
}

function saveGame() {
    const saveData = {
        scene: currentScene,
        textIndex: textIndex
    };
    localStorage.setItem("vn_save", JSON.stringify(saveData));
}

function loadGame(startFresh = false) {
    const data = localStorage.getItem("vn_save");
    if (!data || startFresh) {
        currentScene = 0;
        textIndex = 0;
        return;
    }
    const save = JSON.parse(data);
    currentScene = save.scene;
    textIndex = save.textIndex;
    showScene();
}

/* ---------------- RENDERING ---------------- */

function typeText(text) {
    const box = document.getElementById("textbox");
    box.innerHTML = "";

    [...text].forEach((char, i) => {
        const span = document.createElement("span");
        span.className = "fade-letter";
        span.style.animationDelay = (i * 0.02) + "s";
        span.innerHTML = char === " " ? "&nbsp;" : char;
        box.appendChild(span);
    });
}

function showCharacters(list) {
    const layer = document.getElementById("characterLayer");
    layer.innerHTML = "";

    if (!list) return;

    list.forEach(char => {
        const img = document.createElement("img");
        img.className = "characterSprite";
        img.src = char.src;
        img.style.left = char.x;
        img.style.width = char.width;

        layer.appendChild(img);

        setTimeout(() => {
            img.style.opacity = 1;
            img.style.transform = "translateY(0)";
        }, 50);
    });
}

function showScene() {
    const scene = scenes[currentScene];

    const bg = document.getElementById("backgroundImage");
    bg.style.opacity = 0;
    setTimeout(() => {
        bg.src = scene.background;
        bg.style.opacity = 1;
    }, 200);

    showCharacters(scene.characters || []);

    const nameBox = document.getElementById("nameBox");
    nameBox.style.display = scene.name ? "block" : "none";
    nameBox.innerText = scene.name || "";

    typeText(scene.text[textIndex]);

    document.getElementById("choices").style.display = "none";
}

document.body.onclick = function(e) {
    if (e.target.classList.contains("choiceBtn")) return;
    if (document.getElementById("startScreen").style.display !== "none") return;

    const scene = scenes[currentScene];
    textIndex++;

    if (textIndex < scene.text.length) {
        typeText(scene.text[textIndex]);
    } else {
        if (scene.choices) {
            showChoices(scene.choices);
        } else {
            typeText("I'll add better endings later maybe to much text to write.");
            document.getElementById("nameBox").style.display = "none";
        }
    }
};

function showChoices(choiceList) {
    const choiceBox = document.getElementById("choices");
    choiceBox.innerHTML = "";
    choiceBox.style.display = "flex";

    choiceList.forEach(choice => {
        const btn = document.createElement("div");
        btn.className = "choiceBtn";
        btn.innerText = choice.text;
        btn.onclick = () => {
            currentScene = choice.next;
            textIndex = 0;
            saveGame();
            choiceBox.style.display = "none";
            showScene();
        };
        choiceBox.appendChild(btn);
    });
}
